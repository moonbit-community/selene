<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Scene - Selene Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        .game-wrapper {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
            text-align: left;
            line-height: 1.5;
        }

        .back-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
    </style>
    <script src="../preload-assets.js"></script>
    <script src="../_build/js/release/build/scene3d/web/web.js" defer></script>
</head>

<body>
    <div class="container">
        <h1>3D Scene</h1>
        <div class="game-wrapper">
            <canvas id="canvas" style="display: block; margin: 0 auto;" height="32" width="32"></canvas>
        </div>
        <div class="instructions">
            This example uses the unified Selene backend 3D API.
            Current web backend support is implementation-dependent.
        </div>
        <a href="../index.html" class="back-link">← Back to Games</a>
    </div>
</body>

</html>
