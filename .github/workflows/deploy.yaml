name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main    
  workflow_dispatch:

permissions:
  contents: write   
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Moonbit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Build project
        run: |
          cd examples
          moon update
          web_packages=$(find ./web -mindepth 1 -maxdepth 1 -type d | sort)
          if [ -z "$web_packages" ]; then
            echo "No web example packages found under examples/web/*"
            exit 1
          fi
          while IFS= read -r pkg; do
            if [ -z "$pkg" ]; then
              continue
            fi
            echo "Building $pkg"
            moon build "$pkg" --target js --release
          done <<< "$web_packages"

      - name: Copy example games
        run: |
          python3 publish.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: page
