on:
  schedule:
    - cron: '0 10 * * 2'
  pull_request:
  push:

jobs:
  build:
    env:
      MOONBIT_INSTALL_VERSION: nightly
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use MSVC on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure C compiler on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          echo "CC=cl" >> $env:GITHUB_ENV
          echo "CXX=cl" >> $env:GITHUB_ENV

      - name: Install MoonBit
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install MoonBit on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Reject legacy UI APIs
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          bash scripts/check_no_legacy_ui.sh

      - name: selene-core
        run: |
          cd selene-core
          moon update
          moon check --deny-warn
          moon build
      
      - name: selene-webgpu
        run: |
          cd selene-webgpu
          moon update
          moon check --deny-warn
          moon build

      - name: selene-editor-shared
        run: |
          cd selene-editor-shared
          moon update
          moon check --target all --deny-warn

      - name: selene-editor-frontend
        run: |
          cd selene-editor-frontend
          moon update
          moon check --target js --deny-warn

      - name: selene-editor-service
        run: |
          cd selene-editor-service
          moon update
          moon check --target native --deny-warn

      - name: selene-examples
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          cd examples
          moon update

          web_packages=$(find . -mindepth 2 -maxdepth 2 -type d -name web | sort)
          if [ -z "$web_packages" ]; then
            echo "No web example packages found under examples/*/web"
            exit 1
          fi

          while IFS= read -r pkg; do
            if [ -z "$pkg" ]; then
              continue
            fi
            echo "Checking preferred target for $pkg"
            moon -C "$pkg" check --deny-warn
          done <<< "$web_packages"
