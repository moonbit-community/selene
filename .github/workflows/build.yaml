on:
  schedule:
    - cron: '0 10 * * 2'
  pull_request:
  push:

jobs:
  build:
    env:
      MOONBIT_INSTALL_VERSION: nightly
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use MSVC on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure C compiler on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          echo "CC=cl" >> $env:GITHUB_ENV
          echo "CXX=cl" >> $env:GITHUB_ENV

      - name: Install raylib native dependencies on Ubuntu
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxi-dev \
            libxrandr-dev

      - name: Install MoonBit
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install MoonBit on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Reject legacy UI APIs
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          bash scripts/check_no_legacy_ui.sh

      - name: Check formatting
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: moon fmt --check

      - name: selene-core
        run: |
          cd selene-core
          moon update
          moon check --deny-warn
          moon test src/animation src/app src/asset src/autotile2d src/collision src/editor_bridge src/entity src/event src/input_action src/inputs src/ldtk src/math src/physics3d src/render2d src/render3d src/render_submit src/runtime_debug src/scene3d src/sprite src/text2d src/tiled src/touch_controls src/transform src/ui --target native --release --deny-warn
          moon build

      - name: selene-raylib
        run: |
          cd selene-raylib
          moon update
          moon check --target native --deny-warn
          moon test src --target native --release --deny-warn
      
      - name: selene-webgpu
        run: |
          cd selene-webgpu
          moon update
          moon check --deny-warn
          moon build

      - name: selene-editor-shared
        run: |
          cd selene-editor-shared
          moon update
          moon check --target all --deny-warn

      - name: selene-editor-frontend
        run: |
          cd selene-editor-frontend
          moon update
          moon check --target js --deny-warn

      - name: selene-editor-service
        run: |
          cd selene-editor-service
          moon update
          moon check --target native --deny-warn
          moon test service/core --target native --release --deny-warn

      - name: selene-editor-specs
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          cd selene-editor-specs
          moon update
          moon test specs --target native --release --deny-warn

      - name: selene-examples
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          cd examples
          moon update
          moon check --deny-warn

      - name: selene-examples-native
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          cd examples-native
          moon update
          moon check --target native --deny-warn
          moon test support --target native --release --deny-warn

      - name: selene-examples-web
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          cd examples-web
          moon update
          moon check --target js --deny-warn
